<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadas Realizadas</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="jugadas-container">
        <div class="jugadas-header">
            <h2 class="jugadas-title">Jugadas Realizadas</h2>
            <a href="https://www.quini-6-resultados.com.ar/quini6/controlar-boleta.aspx" target="_blank" class="btn blue large control-btn">A Controlar!!!</a>
        </div>
        <div class="form-section">
            <p id="message" class="message"></p>
            <input type="date" id="fecha" required>
            <div class="inputs">
                <input type="number" min="0" max="45" class="input-cell" id="num1" required>
                <input type="number" min="0" max="45" class="input-cell" id="num2" required>
                <input type="number" min="0" max="45" class="input-cell" id="num3" required>
                <input type="number" min="0" max="45" class="input-cell" id="num4" required>
                <input type="number" min="0" max="45" class="input-cell" id="num5" required>
                <input type="number" min="0" max="45" class="input-cell" id="num6" required>
                <div class="aciertos-cell">
                    <label for="aciertos">Aciertos</label>
                    <input type="number" min="0" max="6" id="aciertos" required>
                </div>
            </div>
            <div class="actions">
                <button id="btn-guardar" class="btn red large">Guardar</button>
                <a href="/" class="btn black large">Volver</a>
            </div>
        </div>
        <table id="jugadas-table">
            <thead>
                <tr><th>Fecha</th><th>Jugada</th><th>Aciertos</th><th>Premio</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="/static/js/jugadas.js"></script>
</body>
</html>
